<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fd3ff"/>
      <stop offset="100%" stop-color="#2f9ae0"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd7ea"/>
      <stop offset="100%" stop-color="#ffb3d1"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- ears -->
  <ellipse cx="176" cy="176" rx="46" ry="52" fill="url(#face)" transform="rotate(-25 176 176)"/>
  <ellipse cx="336" cy="176" rx="46" ry="52" fill="url(#face)" transform="rotate(25 336 176)"/>

  <!-- face -->
  <ellipse cx="256" cy="288" rx="140" ry="126" fill="url(#face)"/>

  <!-- eyes -->
  <circle cx="206" cy="268" r="14" fill="#5b4048"/>
  <circle cx="306" cy="268" r="14" fill="#5b4048"/>

  <!-- cheeks -->
  <ellipse cx="176" cy="312" rx="20" ry="14" fill="#ff8fb3" opacity="0.7"/>
  <ellipse cx="336" cy="312" rx="20" ry="14" fill="#ff8fb3" opacity="0.7"/>

  <!-- snout -->
  <ellipse cx="256" cy="330" rx="58" ry="42" fill="#ff9dc0"/>
  <ellipse cx="234" cy="330" rx="10" ry="14" fill="#e0678f"/>
  <ellipse cx="278" cy="330" rx="10" ry="14" fill="#e0678f"/>
</svg>
