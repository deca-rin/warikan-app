<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐷 わりかんアプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <header class="app-header">
    <h1><span class="emoji-wobble">🐷</span> わりかんアプリ <span class="emoji-wobble">💕</span></h1>
  </header>

  <!-- 画面1: 人数選択 -->
  <section id="screen-count" class="screen active">
    <h2><span class="step-badge">STEP 1</span> 👥 メンバー人数を選択</h2>
    <div class="count-row">
      <button type="button" class="stepper" id="count-minus">−</button>
      <div class="count-input-wrap">
        <input type="number" id="member-count" min="2" max="20" value="2" inputmode="numeric">
        <button type="button" class="mic-btn" data-target="member-count" data-numeric="true" title="音声で人数を入力">🎤</button>
      </div>
      <button type="button" class="stepper" id="count-plus">＋</button>
    </div>
    <p class="hint">人数を数字で発音してください（例：「4」）</p>
    <button type="button" class="primary-btn" id="to-names">次へ ▶</button>
  </section>

  <!-- 画面2: メンバー名入力 -->
  <section id="screen-names" class="screen">
    <h2><span class="step-badge">STEP 2</span> ✏️ メンバーの名前を入力</h2>
    <div id="name-inputs" class="name-inputs"></div>
    <div class="nav-row">
      <button type="button" class="secondary-btn" id="back-to-count">◀ 戻る</button>
      <button type="button" class="primary-btn" id="to-main">はじめる 🚀</button>
    </div>
  </section>

  <!-- 画面3: メイン(支払い記録・清算) -->
  <section id="screen-main" class="screen">
    <div class="card">
      <h2>💰 支払いを記録</h2>
      <div class="form-row">
        <label for="payer-select">支払った人</label>
        <select id="payer-select"></select>
      </div>
      <div class="form-row">
        <label for="amount-input">金額（円）</label>
        <div class="input-with-mic">
          <input type="number" id="amount-input" min="0" inputmode="numeric" placeholder="例：3000">
          <button type="button" class="mic-btn" data-target="amount-input" data-numeric="true" title="音声で金額を入力">🎤</button>
        </div>
      </div>
      <div class="form-row">
        <label for="memo-input">内容（任意）</label>
        <div class="input-with-mic">
          <input type="text" id="memo-input" placeholder="例：夕食代">
          <button type="button" class="mic-btn" data-target="memo-input" title="音声で内容を入力">🎤</button>
        </div>
      </div>
      <button type="button" class="primary-btn" id="add-expense">＋ 追加する</button>
    </div>

    <div class="card">
      <h2>📊 メンバー各自の支払合計 <button type="button" class="edit-icon-btn" id="edit-names-btn" title="メンバー名を編集">✏️</button></h2>
      <ul id="totals-list" class="totals-list"></ul>
      <div class="nav-row" id="edit-names-actions" hidden>
        <button type="button" class="secondary-btn" id="cancel-names-btn">キャンセル</button>
        <button type="button" class="primary-btn" id="save-names-btn">💾 保存</button>
      </div>
    </div>

    <div class="card">
      <h2>🧾 支払い履歴</h2>
      <ul id="expense-list" class="expense-list"></ul>
      <p id="no-expense-msg" class="hint">まだ支払いが記録されていません</p>
    </div>

    <div class="nav-row">
      <button type="button" class="secondary-btn" id="reset-app">🔄 最初からやり直す</button>
      <button type="button" class="primary-btn" id="settle-btn">✨ 清算する</button>
    </div>

    <div class="card" id="settlement-result" hidden>
      <h2>🎉 清算方法</h2>
      <ul id="settlement-list" class="settlement-list"></ul>
      <p id="no-settlement-msg" class="hint" hidden>清算の必要はありません</p>
    </div>
  </section>

</div>
<script src="app.js"></script>
</body>
</html>
